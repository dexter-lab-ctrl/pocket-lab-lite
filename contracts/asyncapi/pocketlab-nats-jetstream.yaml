    "schemas": {
      "CommandEnvelope": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "operation_id"
        ],
        "properties": {
          "operation_id": {
            "type": "string"
          },
          "operation": {
            "type": "string"
          },
          "target": {
            "type": "object",
            "additionalProperties": true
          },
          "params": {
            "type": "object",
            "additionalProperties": true
          },
          "correlation_id": {
            "type": "string"
          }
        }
      },
      "EventEnvelope": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "subject",
          "time"
        ],
        "properties": {
          "event_id": {
            "type": "string"
          },
          "operation_id": {
            "type": "string"
          },
          "correlation_id": {
            "type": "string"
          },
          "subject": {
            "type": "string"
          },
          "status": {
            "type": "string"
          },
          "time": {
            "type": "string",
            "format": "date-time"
          },
          "message": {
            "type": "string"
          },
          "payload": {
            "type": "object",
            "additionalProperties": true
          }
        }
      },
      "DeadLetterEnvelope": {
        "type": "object",
        "additionalProperties": true,
        "properties": {
          "original_subject": {
            "type": "string"
          },
          "reason": {
            "type": "string"
          },
          "attempts": {
            "type": "integer"
          },
          "last_error": {
            "type": "string"
          },
          "payload": {
            "type": "object",
            "additionalProperties": true
          }
        }
      }
    }
  },
