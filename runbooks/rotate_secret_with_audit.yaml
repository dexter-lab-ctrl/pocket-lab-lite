apiVersion: pocketlab.io/v1alpha1
kind: Runbook
metadata:
  name: rotate_secret_with_audit
  title: Rotate Secret with Audit Evidence
  description: Rotate a managed secret with policy approval, audit evidence, and post-change verification.
  owner: security-operations
  tags:
  - secrets
  - vault
  - audit
  - security
spec:
  professionalLabel: Rotate Secret with Audit Evidence
  simpleLabel: Change Password Safely
  category: security
  severity: critical
  trigger:
    manual: true
    eventHints:
    - pocketlab.events.operation.succeeded
  requiresApproval: true
  policy:
    approvalReason: Secret rotation changes sensitive access material.
    minimumRole: security_reviewer
    evidenceRequired: true
    approvalRequired: true
    approvalRoles:
    - security_reviewer
  prerequisites:
  - Secret owner has approved the rotation window.
  - Dependent services are identified.
  - Audit destination is reachable.
  steps:
  - name: pre_rotation_health
    title: Pre-rotation Health Check
    operation: health_check
    description: Confirm runtime is healthy before secret rotation.
    requiresApproval: false
    timeoutSeconds: 300
    onFailure: stop
  - name: rotate_secret
    title: Rotate Secret
    operation: rotate_secret
    description: Rotate the selected secret through the typed secret operation.
    requiresApproval: true
    timeoutSeconds: 600
    onFailure: stop
  - name: verify_secret_read
    title: Verify Secret Access
    operation: secret_read_dynamic
    description: Verify dynamic secret access path without exposing the secret value.
    requiresApproval: false
    timeoutSeconds: 300
    onFailure: stop
  - name: post_rotation_health
    title: Post-rotation Health Check
    operation: health_check
    description: Confirm runtime health after secret rotation.
    requiresApproval: false
    timeoutSeconds: 300
    onFailure: continue
  rollback:
    operation: rotate_secret
    requiresApproval: true
    description: Rotate again or restore the prior credential according to the approved recovery path.
  evidence:
  - operation_events
  - audit_events
  - workflow_journal
  - policy_decision
  - redaction_check
  safety:
    impact: critical
    notes: Secret values must never be written to runbook logs, audit events, docs, or DLQ payloads.
  approval:
    required: true
    role: security_reviewer
    roles:
    - security_reviewer
    reviewerRoles:
    - security_reviewer
    approvers:
    - role: security_reviewer
  governance:
    approvalRequired: true
    approvalRoles:
    - security_reviewer
