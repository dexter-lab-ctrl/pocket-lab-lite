apiVersion: pocketlab.io/v1alpha1
kind: TypedOperation
metadata:
  name: restore_backup
  title: Restore Backup
  description: Restore runtime state from a verified backup.
  tags:
  - backup
  - disaster-recovery
  - destructive
spec:
  professionalLabel: Restore backup
  simpleLabel: Restore saved copy
  uiEntrypoints:
  - Disaster Recovery
  apiEntrypoints:
  - /api/operations/execute
  - /api/operations/preview
  natsSubject: pocketlab.commands.operation.execute
  successEvents:
  - pocketlab.events.operation.succeeded
  failureEvents:
  - pocketlab.events.operation.failed
  - pocketlab.dlq.original_subject
  backendOwner: backup/disaster recovery handler
  targetShape:
    type: backup
    ref: backup-id
  paramsShape:
    preview: true
    confirm: true
  safety: Destructive write. Requires preview, confirmation, and healthy control plane.
  notes: Should show overwrite warnings and estimated restore size.
security:
  data_classification: recovery
  stride:
  - Tampering
  - Repudiation
  - Denial of Service
  - Elevation of Privilege
  trust_boundaries:
  - browser_to_fastapi
  - fastapi_to_nats
  - nats_to_worker
  - worker_to_state_audit
  attack_surfaces:
  - api_endpoint
  - nats_subject
  - worker_handler
  - state_store
  - event_journal
  - dlq_subject
  mitigations:
  - typed_operation_schema
  - openapi_validation
  - asyncapi_subject_governance
  - operation_audit_events
  - event_sourced_workflow_journal
  - dlq_review_path
  - correlation_ids
  residual_risks:
  - Authorized operators can still trigger high-impact changes if policy or approval controls are incomplete.
  - Edge-first deployments remain sensitive to host, storage, and network availability.
  evidence:
  - architecture/structurizr/workspace.dsl
  - contracts/generated/openapi.json
  - contracts/asyncapi/pocketlab-nats-jetstream.yaml
  - contracts/operations/pocketlab-typed-operations.json
  - operations/restore_backup.yaml
