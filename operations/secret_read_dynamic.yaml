apiVersion: pocketlab.io/v1alpha1
kind: TypedOperation
metadata:
  name: secret_read_dynamic
  title: Read Dynamic Secret
  description: Request or renew a dynamic secret lease.
  tags:
  - vault
  - dynamic-secret
  - read
spec:
  professionalLabel: Read dynamic secret
  simpleLabel: Get temporary password
  uiEntrypoints:
  - Identity Vault
  - Passwords & Access
  apiEntrypoints:
  - /api/operations/execute
  natsSubject: pocketlab.commands.vault.dynamic_secret
  successEvents:
  - pocketlab.events.vault.lease_created
  - pocketlab.events.operation.succeeded
  failureEvents:
  - pocketlab.events.operation.failed
  backendOwner: vault domain command handler
  targetShape:
    type: dynamic-secret
    ref: role-name
  paramsShape:
    ttl: string
  safety: Lease values must be redacted and not persisted in UI-visible events.
  notes: Useful for short-lived credentials.
security:
  data_classification: secret
  stride:
  - Tampering
  - Repudiation
  - Information Disclosure
  - Elevation of Privilege
  trust_boundaries:
  - browser_to_fastapi
  - fastapi_to_nats
  - nats_to_worker
  - worker_to_secrets_policy
  attack_surfaces:
  - api_endpoint
  - nats_subject
  - worker_handler
  - vault_or_policy_adapter
  - audit_event_payload
  mitigations:
  - typed_operation_schema
  - openapi_validation
  - asyncapi_subject_governance
  - operation_audit_events
  - opa_policy_decision
  - secret_redaction
  - vault_or_openbao_leases
  residual_risks:
  - Authorized operators can still trigger high-impact changes if policy or approval controls are incomplete.
  - New secret or policy fields may require manual redaction review.
  evidence:
  - architecture/structurizr/workspace.dsl
  - contracts/generated/openapi.json
  - contracts/asyncapi/pocketlab-nats-jetstream.yaml
  - contracts/operations/pocketlab-typed-operations.json
  - operations/secret_read_dynamic.yaml
