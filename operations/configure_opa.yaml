apiVersion: pocketlab.io/v1alpha1
kind: TypedOperation
metadata:
  name: configure_opa
  title: Configure OPA
  description: Configure or refresh OPA policy guardrails.
  tags:
  - security
  - opa
  - policy
  - write
spec:
  professionalLabel: Configure OPA
  simpleLabel: Update safety rules
  uiEntrypoints:
  - Policy Guardrails
  - Safety Center
  apiEntrypoints:
  - /api/operations/execute
  natsSubject: pocketlab.commands.security.configure_opa
  successEvents:
  - pocketlab.events.operation.succeeded
  failureEvents:
  - pocketlab.events.operation.failed
  backendOwner: policy guardrails / OPA integration
  targetShape:
    type: policy
    ref: opa-bundle
  paramsShape:
    bundle: string
  safety: Policy mutation. Must be auditable and recoverable.
  notes: Controls policy behavior for blueprint and security workflows.
security:
  data_classification: policy
  stride:
  - Tampering
  - Repudiation
  - Information Disclosure
  - Elevation of Privilege
  trust_boundaries:
  - browser_to_fastapi
  - fastapi_to_nats
  - nats_to_worker
  - worker_to_secrets_policy
  attack_surfaces:
  - api_endpoint
  - nats_subject
  - worker_handler
  - vault_or_policy_adapter
  - audit_event_payload
  mitigations:
  - typed_operation_schema
  - openapi_validation
  - asyncapi_subject_governance
  - operation_audit_events
  - opa_policy_decision
  - secret_redaction
  - vault_or_openbao_leases
  residual_risks:
  - Authorized operators can still trigger high-impact changes if policy or approval controls are incomplete.
  - New secret or policy fields may require manual redaction review.
  evidence:
  - architecture/structurizr/workspace.dsl
  - contracts/generated/openapi.json
  - contracts/asyncapi/pocketlab-nats-jetstream.yaml
  - contracts/operations/pocketlab-typed-operations.json
  - operations/configure_opa.yaml
