apiVersion: pocketlab.io/v1alpha1
kind: TypedOperation
metadata:
  name: rotate_secret
  title: Rotate Secret
  description: Rotate a secret through Identity Vault.
  tags:
  - vault
  - secret
  - write
spec:
  professionalLabel: Rotate Secret
  simpleLabel: Change Password
  uiEntrypoints:
  - Identity Vault
  - Passwords & Access
  apiEntrypoints:
  - /api/operations/execute
  natsSubject: pocketlab.commands.vault.rotate
  successEvents:
  - pocketlab.events.vault.secret_rotated
  - pocketlab.events.operation.succeeded
  failureEvents:
  - pocketlab.events.operation.failed
  backendOwner: vault domain command handler
  targetShape:
    type: secret
    ref: vault/path/redacted
  paramsShape:
    rotation_policy: default
  safety: High sensitivity. Secret values must never appear in logs/events.
  notes: Simple Mode exposes this as Change Password.
security:
  data_classification: secret
  stride:
  - Tampering
  - Repudiation
  - Information Disclosure
  - Elevation of Privilege
  trust_boundaries:
  - browser_to_fastapi
  - fastapi_to_nats
  - nats_to_worker
  - worker_to_secrets_policy
  attack_surfaces:
  - api_endpoint
  - nats_subject
  - worker_handler
  - vault_or_policy_adapter
  - audit_event_payload
  mitigations:
  - typed_operation_schema
  - openapi_validation
  - asyncapi_subject_governance
  - operation_audit_events
  - opa_policy_decision
  - secret_redaction
  - vault_or_openbao_leases
  residual_risks:
  - Authorized operators can still trigger high-impact changes if policy or approval controls are incomplete.
  - New secret or policy fields may require manual redaction review.
  evidence:
  - architecture/structurizr/workspace.dsl
  - contracts/generated/openapi.json
  - contracts/asyncapi/pocketlab-nats-jetstream.yaml
  - contracts/operations/pocketlab-typed-operations.json
  - operations/rotate_secret.yaml
