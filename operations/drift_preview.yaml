apiVersion: pocketlab.io/v1alpha1
kind: TypedOperation
metadata:
  name: drift_preview
  title: Preview Drift Remediation
  description: Preview the action required to remediate drift.
  tags:
  - drift
  - preview
  - read
spec:
  professionalLabel: Preview remediation
  simpleLabel: Preview fix
  uiEntrypoints:
  - Drift Center
  apiEntrypoints:
  - /api/operations/preview
  - /api/operations/execute
  natsSubject: pocketlab.commands.drift.preview
  successEvents:
  - pocketlab.events.operation.previewed
  failureEvents:
  - pocketlab.events.operation.failed
  backendOwner: drift service
  targetShape:
    type: drift
    ref: drift-id
  paramsShape:
    dry_run: true
  safety: Preview-only. Must not mutate runtime state.
  notes: Used before approving/applying remediation.
security:
  data_classification: configuration
  stride:
  - Tampering
  - Repudiation
  - Denial of Service
  - Elevation of Privilege
  trust_boundaries:
  - browser_to_fastapi
  - fastapi_to_nats
  - nats_to_worker
  - worker_to_state_audit
  attack_surfaces:
  - api_endpoint
  - nats_subject
  - worker_handler
  - state_store
  - event_journal
  - dlq_subject
  mitigations:
  - typed_operation_schema
  - openapi_validation
  - asyncapi_subject_governance
  - operation_audit_events
  - event_sourced_workflow_journal
  - dlq_review_path
  - correlation_ids
  residual_risks:
  - Authorized operators can still trigger high-impact changes if policy or approval controls are incomplete.
  - Edge-first deployments remain sensitive to host, storage, and network availability.
  evidence:
  - architecture/structurizr/workspace.dsl
  - contracts/generated/openapi.json
  - contracts/asyncapi/pocketlab-nats-jetstream.yaml
  - contracts/operations/pocketlab-typed-operations.json
  - operations/drift_preview.yaml
