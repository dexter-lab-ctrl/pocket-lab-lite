apiVersion: pocketlab.io/v1alpha1
kind: TypedOperation
metadata:
  name: fleet_join
  title: Join Fleet
  description: Create onboarding material for a new fleet or mesh device.
  tags:
  - fleet
  - onboarding
  - secret
spec:
  professionalLabel: Join Fleet
  simpleLabel: Add Device
  uiEntrypoints:
  - Mesh Fleet
  - My Devices
  apiEntrypoints:
  - /api/operations/execute
  natsSubject: pocketlab.commands.fleet.join
  successEvents:
  - pocketlab.events.fleet.invite_created
  - pocketlab.events.operation.succeeded
  failureEvents:
  - pocketlab.events.operation.failed
  backendOwner: fleet router / fleet service / domain command handler
  targetShape:
    type: fleet-node
    ref: node-name
  paramsShape:
    role: compute|storage|observer|controller
  safety: Sensitive onboarding action. Join secrets must be redacted.
  notes: Supports zero-touch fleet onboarding and mesh agent workflows.
security:
  data_classification: secret
  stride:
  - Tampering
  - Repudiation
  - Information Disclosure
  - Elevation of Privilege
  trust_boundaries:
  - browser_to_fastapi
  - fastapi_to_nats
  - nats_to_worker
  - worker_to_secrets_policy
  attack_surfaces:
  - api_endpoint
  - nats_subject
  - worker_handler
  - vault_or_policy_adapter
  - audit_event_payload
  mitigations:
  - typed_operation_schema
  - openapi_validation
  - asyncapi_subject_governance
  - operation_audit_events
  - opa_policy_decision
  - secret_redaction
  - vault_or_openbao_leases
  residual_risks:
  - Authorized operators can still trigger high-impact changes if policy or approval controls are incomplete.
  - New secret or policy fields may require manual redaction review.
  evidence:
  - architecture/structurizr/workspace.dsl
  - contracts/generated/openapi.json
  - contracts/asyncapi/pocketlab-nats-jetstream.yaml
  - contracts/operations/pocketlab-typed-operations.json
  - operations/fleet_join.yaml
