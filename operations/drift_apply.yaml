apiVersion: pocketlab.io/v1alpha1
kind: TypedOperation
metadata:
  name: drift_apply
  title: Apply Drift Remediation
  description: Apply approved drift remediation.
  tags:
  - drift
  - remediation
  - write
spec:
  professionalLabel: Apply remediation
  simpleLabel: Fix issue
  uiEntrypoints:
  - Drift Center
  apiEntrypoints:
  - /api/operations/execute
  natsSubject: pocketlab.commands.drift.apply
  successEvents:
  - pocketlab.events.operation.succeeded
  failureEvents:
  - pocketlab.events.operation.failed
  - pocketlab.dlq.original_subject
  backendOwner: drift worker handler
  targetShape:
    type: drift
    ref: drift-id
  paramsShape:
    mode: approved
  safety: Write action. Requires healthy control plane and prior approval.
  notes: Should not run as an implicit side effect of scan.
security:
  data_classification: configuration
  stride:
  - Tampering
  - Repudiation
  - Denial of Service
  - Elevation of Privilege
  trust_boundaries:
  - browser_to_fastapi
  - fastapi_to_nats
  - nats_to_worker
  - worker_to_state_audit
  attack_surfaces:
  - api_endpoint
  - nats_subject
  - worker_handler
  - state_store
  - event_journal
  - dlq_subject
  mitigations:
  - typed_operation_schema
  - openapi_validation
  - asyncapi_subject_governance
  - operation_audit_events
  - event_sourced_workflow_journal
  - dlq_review_path
  - correlation_ids
  residual_risks:
  - Authorized operators can still trigger high-impact changes if policy or approval controls are incomplete.
  - Edge-first deployments remain sensitive to host, storage, and network availability.
  evidence:
  - architecture/structurizr/workspace.dsl
  - contracts/generated/openapi.json
  - contracts/asyncapi/pocketlab-nats-jetstream.yaml
  - contracts/operations/pocketlab-typed-operations.json
  - operations/drift_apply.yaml
